version: '3.8'
networks:
  proxy-network:
    external: true
services:
  tuwunel:
    image: jevolk/tuwunel:latest
    container_name: tuwunel
    restart: always
    # ИСПОЛЬЗУЕМ СЕТЬ ХОСТА: это решит проблему с DNS и скоростью
    networks:
      - proxy-network
    


    security_opt:
      - label=disable
    volumes:
      - /home/miku/disk1/dev/tuwunel/tuwunel.toml:/etc/tuwunel.toml:ro,Z
      - /home/miku/disk1/dev/tuwunel/matrix_db:/var/lib/tuwunel:Z
    environment:
      - TUWUNEL_CONFIG=/etc/tuwunel.toml  
    # Больше не нужны ports: и dns:, так как мы в сети хоста
