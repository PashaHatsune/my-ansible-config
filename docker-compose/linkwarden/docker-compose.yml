networks:
  proxy-network:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    env_file: /home/mikuserver/disk1/dev/linkwarden/.env
    restart: always
    volumes:
      - /home/mikuserver/disk1/dev/linkwarden/pgdata:/var/lib/postgresql/data
  linkwarden:
    env_file: /home/mikuserver/disk1/dev/linkwarden/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
    restart: always
    # build: . # uncomment to build from source
    image: ghcr.io/linkwarden/linkwarden:latest # comment to build from source
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkwarden.rule=Host(`linkwarden.pashahatsune.pp.ua`)"
      - "traefik.http.routers.linkwarden.entrypoints=websecure"
      - "traefik.http.routers.linkwarden.tls=true"
      - "traefik.http.routers.linkwarden.tls.certresolver=le"
      - "traefik.http.services.linkwarden.loadbalancer.server.port=3000"
    networks:
      - proxy-network
    ports:
      - 3000:3000
    volumes:
      - /home/mikuserver/disk1/dev/linkwarden/data:/data/data
    depends_on:
      - postgres
      - meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    restart: always
    networks:
      - proxy-network
    env_file:
      - /home/mikuserver/disk1/dev/linkwarden/.env
    volumes:
      - /home/mikuserver/disk1/dev/linkwarden/meili_data:/meili_data
