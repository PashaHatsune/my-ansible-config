version: "3.2"
services:
  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    hostname: backrest
    
    podman_args:
      - "--pod=new:"

    userns_mode: "keep-id"

    security_opt:
      - label=disable

    volumes:
      - /home/miku/disk1/dev/backrest:/data:z
      - /home/miku/disk1/dev/backrest/config:/config:z
      - /home/miku/disk1/dev/backrest/cache:/cache:z
      
      - /home/miku/dev:/userdata/miku/dev:ro
      - /home/miku/disk1/dev:/userdata/disk1/dev:ro
      
      - /home/miku/backups:/repos/backups
      - /home/miku/disk1/backups:/repos/disk1-backups

    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TZ=Europe/Moscow
    restart: always
    ports:
      - 9898:9898

