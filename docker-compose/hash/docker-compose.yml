networks:
  proxy-network:
    external: true

services:
  headscale:
    image: docker.io/headscale/headscale:latest
    restart: always
    container_name: headscale
    read_only: true
    tmpfs:
      - /var/run/headscale
    volumes:
      - /home/mikuserver/disk1/dev/hash/config:/etc/headscale:ro,Z
      - /home/mikuserver/disk1/dev/hash/lib:/var/lib/headscale:Z
    command: serve
    healthcheck:
        test: ["CMD", "headscale", "health"]
    networks:
      proxy-network:
        aliases:
          - proxy-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`headscale.pashahatsune.pp.ua`)"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=le"