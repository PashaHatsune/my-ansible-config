networks:
  caddy_net:
    external: true

services:
  headscale:
    image: docker.io/headscale/headscale:latest
    restart: always
    container_name: headscale
    read_only: true
    tmpfs:
      - /var/run/headscale
    volumes:
      - /mnt/disk1/dev/hash/config:/etc/headscale:ro,Z
      - /mnt/disk1/dev/hash/lib:/var/lib/headscale:Z
    command: serve
    healthcheck:
        test: ["CMD", "headscale", "health"]
    networks:
      - caddy_net
    labels:
      caddy: wg.pashahatsune.pp.ua
      caddy.reverse_proxy: "{{upstreams 8080}}"
